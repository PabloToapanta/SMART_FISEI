{% extends 'base.html' %}

{% block title %}Recuperar Contraseña - SMART{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow">
            <div class="card-header bg-primary text-white text-center py-3">
                <h4 class="mb-0">Recuperar Contraseña</h4>
            </div>
            <div class="card-body p-4">
                <p class="text-muted small mb-4">Introduce tu dirección de correo institucional y te enviaremos instrucciones para restablecer tu contraseña.</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="id_email" class="form-label">Correo Institucional (@uta.edu.ec)</label>
                        <input type="email" name="email" class="form-control" required id="id_email" placeholder="ejemplo@uta.edu.ec">
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary">Enviar enlace de recuperación</button>
                    </div>
                </form>
                <div class="text-center mt-3">
                    <a href="{% url 'usuarios:login' %}" class="text-decoration-none">Volver al inicio de sesión</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
