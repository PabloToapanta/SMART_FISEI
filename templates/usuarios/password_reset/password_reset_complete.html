{% extends 'base.html' %}

{% block title %}Contraseña Cambiada - SMART{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 text-center">
        <div class="card shadow p-5">
            <div class="mb-4">
                <i class="fas fa-check-circle fa-4x text-success"></i>
            </div>
            <h3>¡Contraseña actualizada!</h3>
            <p class="mt-3">Tu contraseña ha sido cambiada con éxito. Ahora ya puedes iniciar sesión con tu nueva contraseña.</p>
            <div class="mt-4">
                <a href="{% url 'usuarios:login' %}" class="btn btn-primary">Iniciar Sesión ahora</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
